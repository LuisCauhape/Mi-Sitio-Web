<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>App para Eventos · Luis Cauhapé</title>

  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@200..800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --lime: #c8f53b;
      --pink: #ff4fd8;
      --cyan: #3bdfff;
      --white: #f0ede6;
      --muted: #7a7a8a;
      --font-display: 'Bricolage Grotesque', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --radius: 20px;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    img {
      max-width: 100%;
      display: block;
      content-visibility: auto; /* FIX */
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 2rem;
    }

    .gallery {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .gallery-item {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.06);
      transition: transform .3s;
    }

    .gallery-item:hover {
      transform: translateY(-4px);
    }

    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: .7s;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>Galería</h1>

    <div class="gallery">
      <div class="gallery-item reveal">
        <img src="./Portfolio App Ronda Por las dudas _Mesa de trabajo 1.png">
      </div>

      <div class="gallery-item reveal">
        <img src="./Portfolio App Ronda Por las dudas -05.png">
      </div>
    </div>
  </div>

  <script>
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');

          // 🔥 FIX repaint imágenes
          const imgs = entry.target.querySelectorAll('img');
          imgs.forEach(img => {
            img.style.opacity = "0.99";
            setTimeout(() => {
              img.style.opacity = "1";
            }, 50);
          });

        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>

</body>
</html>
